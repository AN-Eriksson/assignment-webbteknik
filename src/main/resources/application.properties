spring.application.name=assignment-webbteknik
logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.boot.security=INFO

# GitHub OAuth2 client settings
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.github.scope=read:user,user:email

# UFO API configuration
ufo.api.base-url=${UFO_API_URL}

# CORS configuration - comma-separated list of allowed origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

